version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: dev.dockerfile
    container_name: quiz_web
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - .:/app             # <-- Montuje cały projekt (live reload)
    depends_on:
      - db
    environment:
      - FLASK_DEBUG=1      # Włącza tryb debug
      - FLASK_ENV=development
    networks:
      - frontend
      - backend

  db:
    image: postgres:15
    container_name: quiz_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db_init:/docker-entrypoint-initdb.d  # dodanie danych do bazy przy buildzie
    ports:
      - "5432:5432"
    networks:
      - backend

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    depends_on:
      - db
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - backend

  # 🔹 Backup bazy danych na żądanie
  backup:
    image: postgres:15
    container_name: quiz_backup
    depends_on:
      - db
    env_file:
      - .env
    environment:
      PGPASSWORD: ${DB_PASS}  
      DB_USER: ${DB_USER} 
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
    volumes:
      - ./backup:/backup
    command: >
      bash -c "
        mkdir -p /backup &&
        echo 'Oczekiwanie na bazę danych' &&
        until pg_isready -h quiz_db -U ${DB_USER} -d ${DB_NAME} > /dev/null 2>&1; do
          sleep 2
        done &&
        echo 'Baza danych gotowa, tworzenie kopii zapasowej' &&
        pg_dump -h quiz_db -U ${DB_USER} -d ${DB_NAME} > /backup/quizdb_$(date +%F_%H-%M-%S).sql
      "
    networks:
      - backend

volumes:
  db_data:
  pgadmin_data:

networks:
  frontend:
  backend: