{% extends "base.html" %}
{% block title %}Nowy Quiz{% endblock %}
{% block content %}

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            
            <div class="mb-4 text-center">
                <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 60px; height: 60px;">
                    <i class="fas fa-plus fa-2x"></i>
                </div>
                <h2 class="fw-bold">Utwórz nowy quiz</h2>
                <p class="text-body-secondary">Wpisz tytuł, aby rozpocząć dodawanie pytań.</p>
            </div>

            <div class="card shadow-sm border-0">
                <div class="card-body p-4 p-md-5">
                    <form method="POST">
                        <div class="mb-4">
                            <label for="title" class="form-label small text-uppercase fw-bold text-body-secondary">Tytuł quizu</label>
                            <input type="text" 
                                   name="title" 
                                   id="title" 
                                   class="form-control form-control-lg text-center" 
                                   placeholder="Np. Quiz z Pythona" 
                                   required 
                                   autofocus>
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-accent btn-lg rounded-pill fw-bold shadow-sm">
                                <i class="fas fa-check-circle me-1"></i> Zapisz i przejdź dalej
                            </button>
                            <a href="{{ url_for('teacher.my_quizzes') }}" class="btn btn-link text-body-secondary text-decoration-none small">
                                Wróć do listy quizów
                            </a>
                        </div>
                    </form>
                </div>
            </div>

            <div class="mt-4 text-center">
                <div class="p-3 bg-primary-subtle rounded-4 text-primary-emphasis small">
                    <i class="fas fa-lightbulb me-2"></i> Po zapisaniu będziesz mógł dodać pytania i odpowiedzi.
                </div>
            </div>

        </div>
    </div>
</div>

{% endblock %}
