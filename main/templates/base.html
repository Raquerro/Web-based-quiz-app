<!DOCTYPE html>
<html lang="pl" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Quiz App{% endblock %}</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Animate.css & Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

 <style>
    /* LIGHT MODE */
    [data-bs-theme="light"] {
      --app-bg: #f1f5f9;
      --app-navbar: #0f172a;
      --app-accent: #2563eb;
      --app-navbar-text: #ffffff;

      --app-input-bg: #ffffff;
      --app-input-border: #cbd5e1;
    }


    /* DARK MODE */
    [data-bs-theme="dark"] {
      --app-bg: #020617;
      --app-navbar: #020617;
      --app-accent: #38bdf8;
      --app-navbar-text: #e5e7eb;

      --app-input-bg: #020617;
      --app-input-border: #334155;
    }


    /* Global */
    body {
      background-color: var(--app-bg);
    }

    .navbar {
      background-color: var(--app-navbar) !important;
      border-bottom: 1px solid rgba(255,255,255,0.12);
    }

    .navbar-brand,
    .navbar .nav-link {
      color: var(--app-navbar-text) !important;
    }

    .navbar .nav-link:hover {
      opacity: 0.85;
    }

    /* Accent */
    .btn-accent {
      background-color: var(--app-accent);
      color: #020617;
      border: none;
    }

    .btn-accent:hover {
      filter: brightness(1.1);
    }

    /* Surface (cards, forms) */
    .card {
      background-color: var(--bs-body-bg);
      border: 1px solid rgba(255,255,255,0.08);
    }

    /* Headings */
    .card h4 {
      font-weight: 600;
    }

    /* === FORM INPUTS === */
    .form-control {
      background-color: var(--app-input-bg);
      border: 1px solid var(--app-input-border);
      color: var(--bs-body-color);
    }

    .form-control::placeholder {
      color: var(--bs-secondary-color); /* Automatycznie dopasuje się do motywu Bootstrap */
      opacity: 0.6;
    }

    .form-control:focus {
      background-color: var(--app-input-bg);
      border-color: var(--app-accent);
      box-shadow: 0 0 0 0.15rem rgba(56,189,248,0.25);
      color: var(--bs-body-color);
    }

    /* Accent button (PRIMARY ACTION) */
    .btn-accent {
      background-color: var(--app-accent);
      color: #020617;
      border: none;
      font-weight: 600;
    }

    .btn-accent:hover {
      filter: brightness(1.1);
    }

    /* Links */
    a {
      color: var(--app-accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
</style>


</head>
<body>

<nav class="navbar navbar-expand-lg mb-4">
  <div class="container-fluid">
    <a class="navbar-brand" href="{{ url_for('homepage') }}">Quiz App</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

     <div class="collapse navbar-collapse" id="navbarNav">
   
      <ul class="navbar-nav me-auto"></ul>

      {% if current_user.is_authenticated %}
      <!-- Prawa strona: Profil -->
      <ul class="navbar-nav">
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle d-flex align-items-center" href="#" id="userMenu" role="button" data-bs-toggle="dropdown">
            <i class="fa-solid fa-user-circle fa-lg me-2"></i>
            <span>Moje konto</span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userMenu">
            <li><a class="dropdown-item" href="{{ url_for('auth.profile') }}">Mój profil</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item text-danger" href="{{ url_for('auth.logout') }}">Wyloguj</a></li>
          </ul>
        </li>
      </ul>
      {% endif %}
      
  </div>

  <button class="btn btn-outline-light me-3" id="themeToggle" title="Zmień motyw">
    <i class="fa-solid fa-moon"></i>
  </button>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
<script>
  const html = document.documentElement;
  const toggle = document.getElementById("themeToggle");
  const icon = toggle.querySelector("i");

  // start: domyślnie dark albo z pamięci
  const savedTheme = localStorage.getItem("theme") || "dark";
  html.setAttribute("data-bs-theme", savedTheme);
  icon.className = savedTheme === "dark" 
    ? "fa-solid fa-sun" 
    : "fa-solid fa-moon";

  toggle.addEventListener("click", () => {
    const current = html.getAttribute("data-bs-theme");
    const next = current === "dark" ? "light" : "dark";

    html.setAttribute("data-bs-theme", next);
    localStorage.setItem("theme", next);

    icon.className = next === "dark" 
      ? "fa-solid fa-sun" 
      : "fa-solid fa-moon";
  });
</script>


</html>
