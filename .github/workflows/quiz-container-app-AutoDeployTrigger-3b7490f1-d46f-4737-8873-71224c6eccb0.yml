name: Trigger auto deployment for quiz-container-app

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/quiz-container-app-AutoDeployTrigger-3b7490f1-d46f-4737-8873-71224c6eccb0.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.QUIZCONTAINERAPP_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.QUIZCONTAINERAPP_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.QUIZCONTAINERAPP_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: 
          registryUsername: ${{ secrets.QUIZCONTAINERAPP_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.QUIZCONTAINERAPP_REGISTRY_PASSWORD }}
          containerAppName: quiz-container-app
          resourceGroup: MC_quiz-rg_quiz-cluster_polandcentral
          imageToBuild: default/[parameters('containerAppName')]:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


