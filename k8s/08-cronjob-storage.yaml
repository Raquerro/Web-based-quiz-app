apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cronjob-pv-claim
  namespace: quiz-web-app
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: cronjob-pv
  namespace: quiz-web-app
spec:
  capacity:
    storage: 100Mi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  hostPath:
    path: /mnt/k3s-backup
    type: DirectoryOrCreate