apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: quiz-ingress
  namespace: quiz-web-app
spec:
  rules:
  - host: quiz-web-app-cloud.francecentral.cloudapp.azure.com
    http:
       paths:
       - path: /
         pathType: Prefix
         backend:
           service:
             name: quiz-web-service
             port:
               number: 80
