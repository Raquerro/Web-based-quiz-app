apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: quiz-app-hpa
  namespace: quiz-web-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: quiz-web-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
  behavior:
      scaleUp:
        stabilizationWindowSeconds: 0 
        policies:
        - type: Percent
          value: 100 
          periodSeconds: 15
      scaleDown:
        stabilizationWindowSeconds: 300 
        policies:
        - type: Percent
          value: 100
          periodSeconds: 15